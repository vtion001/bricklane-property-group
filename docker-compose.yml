version: '3.8'
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bpg_db
      MYSQL_USER: bpg_user
      MYSQL_PASSWORD: bpg_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
volumes:
  mysql_data:
